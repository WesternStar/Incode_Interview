{{define "index.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chinook Music Browser</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    input[type=search] { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
    .columns { display: flex; gap: 1.5rem; margin-top: 1rem; }
    .column { flex: 1; min-width: 0; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 0.4rem 0.5rem; border-bottom: 1px solid #eee; cursor: pointer; }
    li:hover { background: #f5f5f5; }
    li.active { background: #e8f0fe; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.3rem 0.4rem; border-bottom: 1px solid #eee; }
    h2 { font-size: 1rem; color: #555; margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <h1>Chinook Music Browser</h1>
  <input
    type="search"
    name="q"
    placeholder="Search artists..."
    hx-get="/artists"
    hx-trigger="keyup changed delay:300ms, load"
    hx-target="#artists"
    hx-swap="innerHTML"
  >

  <div class="columns">
    <div class="column">
      <h2>Artists</h2>
      <ul id="artists"></ul>
    </div>
    <div class="column">
      <h2>Albums</h2>
      <ul id="albums"><li>Select an artist</li></ul>
    </div>
    <div class="column">
      <h2>Tracks</h2>
      <table id="tracks">
        <tbody><tr><td>Select an album</td></tr></tbody>
      </table>
    </div>
  </div>
</body>
</html>
{{end}}
